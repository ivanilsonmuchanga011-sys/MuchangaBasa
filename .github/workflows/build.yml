name: Gerar APK MuchangaBasa
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          
      - name: Instalar Python e Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet
          
      - name: Configurar Licencas do Android
        run: yes | sdkmanager --licenses
          
      - name: Build APK
        run: flet build apk --main main.py
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
